<!DOCTYPE html>
<html lang="de">
  <head>
    <title>Spielzeit Übersicht</title>
    <script>
      /**
       * =============================================================================
       * SPIELZEIT-DASHBOARD – Kontext für zukünftige Weiterentwicklung
       * =============================================================================
       *
       * ZWECK:
       *   Dieses Dashboard zeigt die Spielzeit von Kindern auf einem Gaming-PC.
       *   Es wird als Webseite im Hintergrund (z. B. via „Website als Desktophintergrund“)
       *   angezeigt, damit die Kinder auf einen Blick sehen: Stunden diesen Monat,
       *   Verlauf pro Tag/Monat, und welche Spiele wie viel Zeit verbraucht haben.
       *
       * DATENQUELLE:
       *   ActivityWatch (https://activitywatch.net). Es werden Fenster-Events ausgewertet
       *   (typischerweise aw-watcher-window-Bucket; die data_source-URL sollte auf den
       *   Export dieses Buckets zeigen, nicht nur aw-watcher-afk). Die API liefert
       *   Rohdaten (timestamp, duration, data.app, data.title). Eine Kategorisierung
       *   wie „Media > GamesKids“ existiert in der Export-API nicht – sie wird nur in
       *   der Web-UI zur Laufzeit berechnet. Daher filtern wir hier ausschließlich
       *   über ein Regex-Muster (CONFIG.kidsPattern) gegen den Fenstertitel (nicht
       *   gegen data.app, um System-Apps wie ApplicationFrameHost nicht zu treffen).
       *
       * WICHTIGE ENTSCHEIDUNGEN:
       *   - Events kürzer als 10 Minuten werden ignoriert (Rauschen/Abweichungen).
       *   - CONFIG.data_source: Standard-Datenquelle (z. B. lokale JSON für Entwicklung).
       *     Kann per URL-Parameter ?data_source=... überschrieben werden
       *     (z. B. ActivityWatch-API-URL). Bei HTTP(S)-Quellen wird bei Fehlern
       *     automatisch erneut geladen (erste Minute alle 5 s, danach jede Minute).
       *   - CORS: Bei Origin "null" (file:// oder manche Desktophintergründe) blockiert
       *     der Browser API-Aufrufe. Dashboard dann per lokalem Webserver (z. B.
       *     http://localhost:8000) ausliefern und in ActivityWatch (config.toml:
       *     cors = ["http://localhost:8000"]) diese Origin erlauben.
       *   - Bei Start: zuerst Anzeige aus localStorage (falls vorhanden), dann
       *     Ladeversuch gegen data_source; bei Erfolg wird in localStorage gespeichert.
       *   - „Aktuelles Datum“ basiert auf dem jüngsten Event im Datensatz, nicht auf
       *     dem echten heutigen Datum, damit historische Exporte stabil bleiben.
       *
       * STRUKTUR:
       *   CONFIG → loadFromCache / loadEvents (lädt CONFIG.data_source) →
       *   extractEvents (unterstützt buckets-Export und einzelne Bucket-Exports) →
       *   aggregate (Filter kidsPattern auf title, 10-min-Schwelle, Aufteilung nach
       *   Jahr/Monat/Tag, monthlyByYearMonth für variable Zeiträume) →
       *   applyData → updateQuotaDisplay + renderCharts (Chart.js: Pro Monat,
       *   Pro Jahr, Pro Jahr & Spiel; Wochenenden im ersten Chart per Plugin).
       */

      const CONFIG = {
        // Datenquelle:
        // - Standard: Export-JSON (z.B. für Entwicklung oder Offline-Nutzung)
        // - Optional: per URL-Parameter überschreibbar, z.B.
        //   ?data_source=http://localhost:5600/api/0/export  (ActivityWatch-API)
        data_source: getDataSourceFromUrl() || "https://code.mathiasnitzsche.de/pc-background/aw-buckets-export.json",

        // Muster (Regex, case-insensitive) für Kinder-Spiele.
        // Es wird gegen den Fenstertitel gematcht.
        kidsPattern:
          "minecraft|takes|crashers|planet|fifa|cat|lego|goat|sackboy|fiction|sonic|overcooked|brawlstars|brothers|gigabash|nba|rocket|fortnite|hypercharge|wreckfest|orcs",

        // Background image files (URLs oder relative Pfade); eines wird zufällig gewählt.
        backgroundImages: [
          "https://w.wallhaven.cc/full/72/wallhaven-72pvye.jpg",  // it takes two
          "https://w.wallhaven.cc/full/6o/wallhaven-6od3vw.jpg",  // it takes two
          "https://w.wallhaven.cc/full/4g/wallhaven-4gpvkq.jpg",  // wall-e
          "https://w.wallhaven.cc/full/4g/wallhaven-4g1l77.jpg",  // one piece
          "https://w.wallhaven.cc/full/0q/wallhaven-0qr8y7.jpg",  // one piece
          "https://w.wallhaven.cc/full/95/wallhaven-95yl5k.png",  // one piece
          "https://w.wallhaven.cc/full/7j/wallhaven-7j38je.png",  // split fiction
          "https://images2.alphacoders.com/139/thumb-1920-1393870.jpg",  // split fiction
          "https://w.wallhaven.cc/full/r2/wallhaven-r2rxjj.jpg",  // anno 1800
          "https://w.wallhaven.cc/full/zp/wallhaven-zpmljg.png",  // satisfactory
          "https://w.wallhaven.cc/full/0j/wallhaven-0jye8w.jpg",  // sackboy 
          "https://w.wallhaven.cc/full/r7/wallhaven-r7m3lq.jpg",  // rdr2
          "https://a.storyblok.com/f/158607/3840x2160/5d855b7111/actionscreenshot_carjump_newversion.jpg",  // goat sim 3
          "https://images6.alphacoders.com/139/thumb-1920-1399082.jpg",  // g.o.a.t.
        ],

        // Monatskontingente (Stunden), aufsteigend nach Jahr/Monat.
        // Jeder Eintrag gilt ab diesem Monat (inkl.) bis zum nächsten Eintrag.
        // Jahresbudget = Summe der Monatskontingente im betrachteten Zeitraum.
        monthlyQuotaHours: [
          { year: 2025, month: 1, hours: 10 },
          { year: 2026, month: 6, hours: 12 },
        ],

        // Anzahl Monate für die unteren beiden Charts (Pro Jahr, Pro Jahr & Spiel).
        // Letzte X Monate inkl. aktuellen (1–12). Weniger Monate = größere Balken.
        monthsToShow: 12,

        // Ziel-Höhe des Dashboards in Prozent der Fensterhöhe (z. B. 40 = ca. 40 % Bildschirmhöhe).
        // Die tatsächliche Skalierung wird dynamisch berechnet, sodass das Panel auf verschiedenen
        // Bildschirmen und DPI-Einstellungen optisch ähnlich groß wirkt.
        sizePercent: 90,

        // Intervall in Sekunden, in dem die Stats bei HTTP(S)-data_source neu geladen werden (z. B. 300 = 5 Min.).
        refreshIntervalSeconds: 300,
      };

      function getDataSourceFromUrl() {
        try {
          const params = new URLSearchParams(window.location.search || "");
          const override = params.get("data_source");
          if (override && override.trim()) {
            return override.trim();
          }
        } catch (e) {
          // Ignorieren, falls URLSearchParams nicht verfügbar ist.
        }
        return "";
      }
    </script>

    <script>
      function setBackgroundImage() {
        try {
          if (CONFIG && Array.isArray(CONFIG.backgroundImages) && CONFIG.backgroundImages.length) {
            const idx = Math.floor(Math.random() * CONFIG.backgroundImages.length);
            const img = CONFIG.backgroundImages[idx];
            document.body.style.backgroundImage = "url('" + img + "')";
          }
        } catch (err) {
          console.error("Failed to set background image", err);
        }
      }

      // ---- Konstanten ----
      // Farbpalette mit möglichst unterschiedlichen, gut unterscheidbaren und eher
      // leuchtenden Farben (angelehnt an kräftige qualitative Paletten).
      const COLOR_PALETTE = [
        "#ef4444", // kräftiges Rot
        "#22c55e", // kräftiges Grün
        "#facc15", // kräftiges Gelb
        "#6366f1", // kräftiges Indigo/Violett
        "#0ea5e9", // kräftiges Hellblau
        "#f97316", // kräftiges Orange
        "#a855f7", // kräftiges Violett
        "#14b8a6", // kräftiges Türkis
        "#84cc16", // Limettengrün
        "#fb7185", // Koralle
        "#b91c1c", // Dunkelrot
        "#15803d", // Dunkelgrün
        "#b45309", // Dunkelorange
        "#1d4ed8", // Dunkelblau
        "#db2777", // Magenta
        "#0f766e", // Petrol
        "#4f46e5", // Indigo
        "#65a30d", // Olivgrün
        "#0891b2", // Zyan
        "#9f1239", // Weinrot
      ];
      
      /**
       * Interpretiert CONFIG.sizePercent als „Ziel-Höhenanteil des Panels
       * relativ zur Fensterhöhe“. Beispiel:
       *   sizePercent = 40  → Panel soll ca. 40 % der Bildschirmhöhe einnehmen.
       * Dazu wird die aktuelle Panel-Höhe gemessen und die CSS-Variable
       * --dashboard-scale so gesetzt, dass diese Zielhöhe ungefähr erreicht wird.
       */
      function updatePanelScaleToHeight() {
        const panel = document.getElementById("stats-panel");
        if (!panel) return;

        const percent = Number(CONFIG.sizePercent);
        if (!Number.isFinite(percent) || percent <= 0) return;

        const viewportHeight = window.innerHeight || 0;
        if (viewportHeight <= 0) return;

        const targetHeight = (percent / 100) * viewportHeight;
        if (targetHeight <= 0) return;

        const root = document.documentElement;
        root.style.setProperty("--dashboard-scale", "1");

        const rect = panel.getBoundingClientRect();
        const currentHeight = rect.height || 0;
        if (currentHeight <= 0) return;

        let scale = targetHeight / currentHeight;
        scale = Math.max(0.5, Math.min(3, scale));

        root.style.setProperty("--dashboard-scale", String(scale));

        // Nach der Skalierung Chart.js informieren, damit Hit-Tests (Tooltips)
        // wieder zur sichtbaren Größe passen.
        requestAnimationFrame(() => {
          if (dayChartInstance) {
            dayChartInstance.resize();
          }
          if (monthChartInstance) {
            monthChartInstance.resize();
          }
          if (gamesChartInstance) {
            gamesChartInstance.resize();
          }
        });
      }

      /** Stunden als H:MM (z. B. 1,25 h → 1:15). Minuten-Angaben bleiben unverändert. */
      function formatHours(value) {
        const n = Number(value || 0);
        if (!Number.isFinite(n) || n < 0) return "0:00";
        const totalMinutes = Math.round(n * 60);
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;
        return `${hours}:${String(minutes).padStart(2, "0")}`;
      }

      /** Anzahl Monate für die unteren Charts, auf 1–12 geklemmt (Default 6). */
      function getMonthsToShow() {
        return Math.min(12, Math.max(1, Number(CONFIG.monthsToShow) || 6));
      }

      // Feste Definition des App-Feldes und der Kinder-Spiel-Filter.
      const APP_FIELD = "app";
      const KIDS_REGEX = new RegExp(CONFIG.kidsPattern, "i");

      function monthNameFromIndex(monthIndex) {
        return new Date(2000, monthIndex, 1).toLocaleString(undefined, {
          month: "short",
        });
      }

      function getDaysInMonth(year, monthIndex) {
        return new Date(year, monthIndex + 1, 0).getDate();
      }

      /** Monatskontingent für Jahr + Monat (monthIndex 0 = Januar). */
      function getMonthlyQuotaHours(year, monthIndex) {
        const rules = CONFIG.monthlyQuotaHours;
        if (!Array.isArray(rules) || !rules.length) return 10;

        const targetKey = year * 12 + monthIndex;
        const sorted = rules
          .map((r) => ({
            key: Number(r.year) * 12 + (Number(r.month) - 1),
            hours: Number(r.hours),
          }))
          .filter((r) => Number.isFinite(r.key) && Number.isFinite(r.hours))
          .sort((a, b) => a.key - b.key);

        if (!sorted.length) return 10;

        let hours = sorted[0].hours;
        for (const rule of sorted) {
          if (rule.key <= targetKey) {
            hours = rule.hours;
          } else {
            break;
          }
        }
        return hours;
      }

      function sumQuotaForMonths(months) {
        return months.reduce(
          (sum, { year, monthIndex }) =>
            sum + getMonthlyQuotaHours(year, monthIndex),
          0
        );
      }

      const AW_CACHE_KEY = "aw-kids-playtime-cache";
      /** Schneller Retry nur bis der erste HTTP-Ladevorgang klappt (max. 60 s). */
      const AW_REFRESH_QUICK_WINDOW_MS = 60 * 1000;
      const AW_REFRESH_QUICK_INTERVAL_MS = 5 * 1000;
      let dataSourceLoadSucceeded = false;

      function updateDevBadgeVisibility() {
        const badge = document.getElementById("dev-badge");
        if (!badge) return;
        const hasOverride = !!getDataSourceFromUrl();
        // Kein data_source-URL-Parameter → wir nutzen die Standard-JSON → DEV MODE anzeigen.
        badge.style.display = hasOverride ? "none" : "inline-flex";
      }

      // ---- Daten laden (API / Fallback / Cache) ----
      function loadFromCache() {
        try {
          const s = localStorage.getItem(AW_CACHE_KEY);
          if (!s) return null;
          return JSON.parse(s);
        } catch (e) {
          return null;
        }
      }

      function saveToCache(raw) {
        try {
          localStorage.setItem(AW_CACHE_KEY, JSON.stringify(raw));
        } catch (e) {}
      }

      async function fetchJson(url) {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) {
          throw new Error("HTTP " + response.status + " " + response.statusText);
        }
        return await response.json();
      }

      /** Liefert events-Array oder null. Speichert bei Erfolg raw in localStorage. */
      async function loadEvents() {
        const messages = [];
        let sourceLabel = "";
        let raw;

        const source = CONFIG.data_source;
        if (!source) {
          console.error("Keine data_source konfiguriert (CONFIG.data_source fehlt).");
          return null;
        }
        try {
          raw = await fetchJson(source);
          sourceLabel = source.startsWith("http")
            ? "ActivityWatch-API"
            : "lokaler JSON-Export";
          messages.push("Datenquelle: " + source);
        } catch (err) {
          const fileProtocolHint =
            window.location.protocol === "file:"
              ? " Hinweis: Direktes Laden von JSON-Dateien per file:// wird von vielen Browsern blockiert. Bitte über einen lokalen Webserver (z. B. http://localhost) aufrufen."
              : "";
          console.error("Konnte data_source nicht laden." + fileProtocolHint, err);
          return null;
        }

        saveToCache(raw);
        const events = extractEvents(raw);

        if (!events || !events.length) {
          console.warn(
            "Keine Ereignisse im Datensatz gefunden. Quelle: " + sourceLabel
          );
          return [];
        }

        console.info(
          "ActivityWatch-Daten geladen:",
          sourceLabel,
          "|",
          messages.join(" "),
          "| Roh-Einträge:",
          events.length
        );

        return events;
      }

      /**
       * Unterstützt sowohl kompletten Bucket-Export (raw.buckets) als auch einzelne
       * Buckets (Array mit .events oder direkt raw.events). Liefert ein flaches Array
       * von Events der Form:
       *
       *   {
       *     timestamp: string | number (ISO oder ms),
       *     duration: number (Sekunden),
       *     data: {
       *       app?: string,
       *       title?: string,
       *       ...weitere Felder, die wir ignorieren
       *     }
       *   }
       */
      function extractEvents(raw) {
        if (!raw) return [];

        if (Array.isArray(raw.events)) {
          return raw.events;
        }

        if (Array.isArray(raw)) {
          if (raw.length && raw[0] && Array.isArray(raw[0].events)) {
            return raw.flatMap((b) => b.events || []);
          }
          return raw;
        }

        if (raw.buckets && typeof raw.buckets === "object") {
          const all = [];
          for (const key of Object.keys(raw.buckets)) {
            const bucket = raw.buckets[key];
            if (bucket && Array.isArray(bucket.events)) {
              all.push(...bucket.events);
            }
          }
          return all;
        }

        return [];
      }

      /**
       * Filtert nach kidsPattern (nur auf data.title), ignoriert Events < 10 min,
       * baut Strukturen für „aktuellen“ Monat (Tage), „aktuelles“ Jahr (Monate) und
       * monthlyByYearMonth für aktuelles + Vorjahr (für variable „letzte X Monate“).
       * „Aktuell“ bezieht sich dabei auf das jüngste Datum im Datensatz, nicht
       * auf das echte heutige Datum, damit historische Exporte stabil bleiben.
       */
      function normalizeGameName(title, app) {
        const baseName = title || app || "Unbekannt";
        let gameKey = baseName
          .replace(/\.exe/gi, "")
          .replace(/\s*\([^)]*\)/g, "")
          .replace(/Rafa/gi, "")
          .replace(/Mateo/gi, "")
          .replace(/\s{2,}/g, " ")
          .replace(/^[\s-]+|[\s-]+$/g, "")
          .trim();
        if (/minecraft/i.test(gameKey)) {
          gameKey = "Minecraft";
        }
        return gameKey || "Unbekannt";
      }

      /**
       * Siehe oben – zentrale Aggregation der Events auf Tages-/Monats-/Jahresebene.
       */
      function aggregate(events) {
        // „Jetzt“ = Zeitpunkt des jüngsten Events im Datensatz (unabhängig vom kidsPattern)
        let latestTs = null;
        for (const ev of events) {
          if (!ev || !ev.timestamp) continue;
          const candidate = new Date(ev.timestamp);
          if (Number.isNaN(candidate.getTime())) continue;
          if (!latestTs || candidate > latestTs) {
            latestTs = candidate;
          }
        }

        const now = latestTs || new Date();
        const currentYear = now.getFullYear();
        const currentMonthIndex = now.getMonth();
        const daysInCurrentMonth = getDaysInMonth(currentYear, currentMonthIndex);
        /** Tag des Monats des jüngsten Events (für rote „heute“-Linie, datenbasiert statt Kalender). */
        const currentDayOfMonth = now.getDate();

        const monthlyByYearMonth = Object.create(null);
        const dailyByApp = Array.from({ length: daysInCurrentMonth }, () =>
          Object.create(null)
        );

        let totalHoursThisMonth = 0;
        let matchedEvents = 0;

        // Pro Tag sammeln wir alle relevanten Events (nach Filterung), um Überschneidungen
        // aufzulösen: zu jedem Zeitpunkt zählt nur das Spiel, das zuerst gestartet wurde.
        const perDayEvents = Object.create(null); // key: `${year}-${monthIndex}-${dayOfMonth}` → Array<{start,end,year,monthIndex,dayOfMonth,gameKey,originalStart}>

        for (const ev of events) {
          if (!ev || !ev.timestamp || typeof ev.duration !== "number") continue;

          const ts = new Date(ev.timestamp);
          if (Number.isNaN(ts.getTime())) continue;

          // Einzelne Events kürzer als 10 Minuten ignorieren
          if (ev.duration < 600) continue;

          const year = ts.getFullYear();
          const monthIndex = ts.getMonth();
          const dayOfMonth = ts.getDate();

          const data = ev.data || {};

          const titleRaw = data.title;
          const title =
            titleRaw && String(titleRaw).trim()
              ? String(titleRaw).trim()
              : "";

          const appRaw = data[APP_FIELD];
          const app =
            appRaw && String(appRaw).trim()
              ? String(appRaw).trim()
              : "Unbekannt";

          // Nur Events zählen, deren Titel auf das Kinder-Spiel-Muster passt.
          if (!KIDS_REGEX.test(title)) {
            continue;
          }

          // "Spielname" aus Titel/App ableiten (inkl. Minecraft-Normalisierung).
          const gameKey = normalizeGameName(title, app);

          const start = ts.getTime();
          const end = start + ev.duration * 1000;
          if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start)
            continue;

          matchedEvents++;

          const dayKey = `${year}-${monthIndex}-${dayOfMonth}`;
          if (!perDayEvents[dayKey]) perDayEvents[dayKey] = [];
          perDayEvents[dayKey].push({
            start,
            end,
            year,
            monthIndex,
            dayOfMonth,
            gameKey,
            originalStart: start,
          });
        }

        // Jetzt pro Tag alle Überschneidungen auflösen: für jedes Zeitintervall
        // zählt nur das zuerst gestartete Spiel.
        for (const dayKey of Object.keys(perDayEvents)) {
          const dayEvents = perDayEvents[dayKey];
          if (!dayEvents || !dayEvents.length) continue;

          // Alle Zeitgrenzen sammeln und sortieren
          const boundariesSet = new Set();
          for (const e of dayEvents) {
            boundariesSet.add(e.start);
            boundariesSet.add(e.end);
          }
          const boundaries = Array.from(boundariesSet).sort((a, b) => a - b);

          for (let i = 0; i < boundaries.length - 1; i++) {
            const segStart = boundaries[i];
            const segEnd = boundaries[i + 1];
            if (segEnd <= segStart) continue;

            // Alle Events, die dieses Segment überdecken
            const active = dayEvents.filter(
              (e) => e.start < segEnd && e.end > segStart
            );
            if (!active.length) continue;

            // Gewinner: Event mit dem frühesten Startzeitpunkt
            let winner = active[0];
            for (let j = 1; j < active.length; j++) {
              if (active[j].originalStart < winner.originalStart) {
                winner = active[j];
              }
            }

            const durationSeconds = (segEnd - segStart) / 1000;
            const hours = durationSeconds / 3600;
            if (!Number.isFinite(hours) || hours <= 0) continue;

            const { year, monthIndex, dayOfMonth, gameKey } = winner;

            const inCurrentYear =
              year === currentYear && monthIndex >= 0 && monthIndex < 12;
            const inPrevYear =
              year === currentYear - 1 && monthIndex >= 0 && monthIndex < 12;

            if (inCurrentYear || inPrevYear) {
              const key = `${year}-${monthIndex}`;
              if (!monthlyByYearMonth[key])
                monthlyByYearMonth[key] = Object.create(null);
              const bucket = monthlyByYearMonth[key];
              bucket[gameKey] = (bucket[gameKey] || 0) + hours;
            }

            if (year === currentYear && monthIndex === currentMonthIndex) {
              const dayIndex = dayOfMonth - 1;
              if (dayIndex >= 0 && dayIndex < daysInCurrentMonth) {
                const dayBucket = dailyByApp[dayIndex];
                dayBucket[gameKey] = (dayBucket[gameKey] || 0) + hours;
              }

              totalHoursThisMonth += hours;
            }
          }
        }

        const appsSet = new Set();
        Object.values(monthlyByYearMonth).forEach((bucket) => {
          Object.keys(bucket).forEach((game) => appsSet.add(game));
        });
        dailyByApp.forEach((bucket) => {
          Object.keys(bucket).forEach((game) => appsSet.add(game));
        });
        const apps = Array.from(appsSet).sort((a, b) => a.localeCompare(b));

        return {
          apps,
          monthlyByYearMonth,
          dailyByApp,
          totalHoursThisMonth,
          currentYear,
          currentMonthIndex,
          daysInCurrentMonth,
          currentDayOfMonth,
          matchedEvents,
        };
      }

      /** Hover über einen gestapelten Balken: alle Spiele + Gesamtzeit im Tooltip. */
      const stackedBarInteraction = {
        mode: "index",
        intersect: false,
      };

      // Tooltip-Reihenfolge: kleinste Zeit oben, größte unten (passt zur Balkenstapelung).
      const stackedBarAscendingSort = (a, b) =>
        (a.parsed.y || 0) - (b.parsed.y || 0);

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function formatTooltipGameName(name) {
        return String(name || "").replace(/\.exe$/i, "");
      }

      function getRankedTooltipEntry(item) {
        const meta = item.dataset.rankMeta?.[item.dataIndex];
        if (meta) {
          return {
            name: formatTooltipGameName(meta.app),
            value: meta.value || 0,
          };
        }
        return {
          name: formatTooltipGameName(item.dataset.label),
          value: item.parsed.y || 0,
        };
      }

      function getTooltipItemColor(item) {
        const backgroundColor = item.dataset.backgroundColor;
        if (Array.isArray(backgroundColor)) {
          return backgroundColor[item.dataIndex] || "transparent";
        }
        return backgroundColor || item.element?.options?.backgroundColor || "#94a3b8";
      }

      function positionStackedBarTooltip(chart, tooltipEl, tooltip) {
        const canvas = chart.canvas;
        const left = canvas.offsetLeft + tooltip.caretX;
        const top = canvas.offsetTop + tooltip.caretY;
        tooltipEl.style.left = left + "px";
        tooltipEl.style.top = top + "px";
        tooltipEl.style.transform = "translate(-50%, calc(-100% - 8px))";
      }

      function createStackedBarTooltipConfig({
        formatValue,
        totalPrefix = "Gesamt",
        showTotalOnlyWhenMultiple = false,
        getTitle,
      }) {
        function getVisibleItems(items) {
          return items
            .filter((item) => (item.parsed.y || 0) > 0)
            .sort(stackedBarAscendingSort);
        }

        function getEntriesFromItems(items) {
          return items.map((item) => {
            const entry = getRankedTooltipEntry(item);
            return {
              name: entry.name,
              value: entry.value,
              text: formatValue(entry.value),
              color: getTooltipItemColor(item),
            };
          });
        }

        return {
          mode: "index",
          intersect: false,
          enabled: false,
          external(context) {
            const { chart, tooltip } = context;
            const anchor = chart.canvas.parentNode;
            if (!anchor) return;

            let tooltipEl = anchor.querySelector(".stacked-bar-tooltip");
            if (!tooltipEl) {
              if (getComputedStyle(anchor).position === "static") {
                anchor.style.position = "relative";
              }
              tooltipEl = document.createElement("div");
              tooltipEl.className = "stacked-bar-tooltip";
              anchor.appendChild(tooltipEl);
            }

            if (tooltip.opacity === 0) {
              tooltipEl.style.opacity = "0";
              return;
            }

            const visible = getVisibleItems(tooltip.dataPoints || []);
            if (!visible.length) {
              tooltipEl.style.opacity = "0";
              return;
            }

            const entries = getEntriesFromItems(visible);
            const showTotal =
              !showTotalOnlyWhenMultiple || visible.length > 1;
            const totalValue = entries.reduce(
              (sum, entry) => sum + entry.value,
              0
            );
            const title = getTitle
              ? getTitle(visible)
              : visible[0]?.label || "";

            let html = "";
            if (title) {
              html += `<div class="stacked-bar-tooltip-title">${escapeHtml(
                title
              )}</div>`;
            }

            html += '<table class="stacked-bar-tooltip-table"><tbody>';
            entries.forEach((entry) => {
              html += `<tr>
                <td class="stacked-bar-tooltip-color"><span class="stacked-bar-tooltip-swatch" style="background:${escapeHtml(entry.color)}"></span></td>
                <td class="stacked-bar-tooltip-name">${escapeHtml(entry.name)}</td>
                <td class="stacked-bar-tooltip-value">${escapeHtml(entry.text)}</td>
              </tr>`;
            });
            if (showTotal) {
              html += `<tr class="stacked-bar-tooltip-separator"><td colspan="3"></td></tr>`;
              html += `<tr class="stacked-bar-tooltip-total">
                <td class="stacked-bar-tooltip-color"></td>
                <td class="stacked-bar-tooltip-name">${escapeHtml(totalPrefix)}</td>
                <td class="stacked-bar-tooltip-value">${escapeHtml(formatValue(totalValue))}</td>
              </tr>`;
            }
            html += "</tbody></table>";

            tooltipEl.innerHTML = html;
            tooltipEl.style.opacity = "1";
            positionStackedBarTooltip(chart, tooltipEl, tooltip);
          },
        };
      }

      /** Gestapelte Monats-Balken: pro Monat nach Spielzeit sortiert (größte unten). */
      function buildRankedStackDatasets(apps, bucketsArray, colorByApp) {
        const rankMetaByBucket = bucketsArray.map((bucket) =>
          apps
            .map((app) => ({ app, value: bucket[app] || 0 }))
            .filter((entry) => entry.value > 0)
            .sort((a, b) => b.value - a.value)
        );
        const slotCount = Math.max(
          0,
          ...rankMetaByBucket.map((ranked) => ranked.length)
        );
        if (slotCount === 0) return [];

        return Array.from({ length: slotCount }, (_, slotIndex) => ({
          label: `rank-${slotIndex}`,
          data: rankMetaByBucket.map((ranked) => ranked[slotIndex]?.value || 0),
          backgroundColor: rankMetaByBucket.map((ranked) => {
            const app = ranked[slotIndex]?.app;
            const color = app ? colorByApp[app] : null;
            return color ? color + "cc" : "transparent";
          }),
          borderColor: rankMetaByBucket.map((ranked) => {
            const app = ranked[slotIndex]?.app;
            const color = app ? colorByApp[app] : null;
            return color || "transparent";
          }),
          borderWidth: 1,
          stack: "stack-0",
          rankMeta: rankMetaByBucket.map((ranked) => ranked[slotIndex] || null),
        }));
      }

      // Oberer Chart = aktueller Monat pro Tag; mittlerer Chart = letzte X Monate pro Monat.
      let dayChartInstance = null;
      let monthChartInstance = null;
      let gamesChartInstance = null;

      function isWeekend(year, monthIndex, dayOfMonth) {
        const d = new Date(year, monthIndex, dayOfMonth);
        const day = d.getDay();
        return day === 0 || day === 6;
      }

      /** Chart.js-Plugin: vertikale Hintergrundstreifen für Sa/So und eine rote Linie für „heute“ im Tages-Chart. */
      const weekendBackgroundPlugin = {
        id: "weekendBackground",
        beforeDatasetsDraw(chart) {
          const cfg = chart.options.plugins?.weekendBackground;
          if (!cfg || cfg.currentYear === undefined) return;
          const { currentYear, currentMonthIndex, daysInMonth, todayDay } = cfg;
          const scale = chart.scales.x;
          if (!scale || daysInMonth < 1) return;
          const ctx = chart.ctx;
          const chartArea = chart.chartArea;
          const step = daysInMonth > 1 ? scale.getPixelForValue(1) - scale.getPixelForValue(0) : 20;
          const weekendColor = "rgba(100, 116, 139, 0.18)";

          for (let i = 0; i < daysInMonth; i++) {
            if (!isWeekend(currentYear, currentMonthIndex, i + 1)) continue;
            const center = scale.getPixelForValue(i);
            const startX = center - step / 2;
            const width = step;
            ctx.save();
            ctx.fillStyle = weekendColor;
            ctx.fillRect(startX, chartArea.top, width, chartArea.bottom - chartArea.top);
            ctx.restore();
          }

          if (todayDay != null && todayDay >= 1 && todayDay <= daysInMonth) {
            const i = todayDay - 1;
            const x = scale.getPixelForValue(i);
            ctx.save();
            ctx.strokeStyle = "rgba(248, 113, 113, 0.9)"; // helleres Rot
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 3]); // gestrichelte Linie
            ctx.beginPath();
            ctx.moveTo(x, chartArea.top);
            ctx.lineTo(x, chartArea.bottom);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
          }
        },
      };
      Chart.register(weekendBackgroundPlugin);

      /** Chart.js-Plugin: hellere horizontale Ziel-Linie (z. B. 60 min/Tag) im Tages-Chart. */
      const dailyTargetLinePlugin = {
        id: "dailyTargetLine",
        afterDatasetsDraw(chart) {
          const cfg = chart.options.plugins?.dailyTargetLine;
          if (!cfg || typeof cfg.value !== "number") return;
          const yScale = chart.scales.y;
          if (!yScale) return;
          const chartArea = chart.chartArea;
          const y = yScale.getPixelForValue(cfg.value);
          if (y < chartArea.top || y > chartArea.bottom) return;

          const ctx = chart.ctx;
          ctx.save();
          ctx.strokeStyle = cfg.color || "rgba(226, 232, 240, 0.8)";
          ctx.lineWidth = cfg.lineWidth || 1.5;
          ctx.beginPath();
          ctx.moveTo(chartArea.left, y);
          ctx.lineTo(chartArea.right, y);
          ctx.stroke();
          ctx.restore();
        },
      };
      Chart.register(dailyTargetLinePlugin);

      /** Chart.js-Plugin: gestufte Quota-Linie pro Monat im Jahres-Chart (10h → 12h etc.). */
      const monthlyQuotaStepLinePlugin = {
        id: "monthlyQuotaStepLine",
        afterDatasetsDraw(chart) {
          const cfg = chart.options.plugins?.monthlyQuotaStepLine;
          if (!cfg || !Array.isArray(cfg.months) || !cfg.months.length) return;

          const xScale = chart.scales.x;
          const yScale = chart.scales.y;
          if (!xScale || !yScale) return;

          const months = cfg.months;
          const n = months.length;
          const step =
            n > 1
              ? xScale.getPixelForValue(1) - xScale.getPixelForValue(0)
              : 40;
          const half = step / 2;

          const ctx = chart.ctx;
          ctx.save();
          ctx.strokeStyle = "rgba(240, 245, 250, 0.65)";
          ctx.lineWidth = 2;
          ctx.beginPath();

          for (let i = 0; i < n; i++) {
            const { year, monthIndex } = months[i];
            const quota = getMonthlyQuotaHours(year, monthIndex);
            const y = yScale.getPixelForValue(quota);
            const xCenter = xScale.getPixelForValue(i);
            const xLeft = xCenter - half;
            const xRight = xCenter + half;

            if (i === 0) {
              ctx.moveTo(xLeft, y);
            } else {
              const prev = months[i - 1];
              const prevY = yScale.getPixelForValue(
                getMonthlyQuotaHours(prev.year, prev.monthIndex)
              );
              ctx.lineTo(xLeft, prevY);
              ctx.lineTo(xLeft, y);
            }
            ctx.lineTo(xRight, y);
          }

          ctx.stroke();
          ctx.restore();
        },
      };
      Chart.register(monthlyQuotaStepLinePlugin);

      /** Erstellt/aktualisiert alle drei Charts (Pro Monat, Pro Jahr, Pro Jahr & Spiel). */
      function renderCharts(agg) {
        const X = getMonthsToShow();
        const currentYear = agg.currentYear;
        const currentMonthIndex = agg.currentMonthIndex;
        const lastXMonths = Array.from({ length: X }, (_, i) => {
          const monthIndex = (currentMonthIndex - X + 1 + i + 12) % 12;
          const year = currentYear - (currentMonthIndex - X + 1 + i < 0 ? 1 : 0);
          return { year, monthIndex };
        });
        const monthLabelsLastX = lastXMonths.map(({ monthIndex }) => {
          return monthNameFromIndex(monthIndex);
        });
        const monthlyByYearMonth = agg.monthlyByYearMonth || {};
        const monthlyByAppLastX = lastXMonths.map(
          ({ year, monthIndex }) => monthlyByYearMonth[`${year}-${monthIndex}`] || {}
        );
        const dayLabels = Array.from(
          { length: agg.daysInCurrentMonth },
          (_, i) => String(i + 1)
        );

        // Farbzuordnung pro Spiel, damit alle Charts dieselben Farben verwenden
        const colorByApp = {};
        agg.apps.forEach((app, index) => {
          colorByApp[app] =
            COLOR_PALETTE[index % COLOR_PALETTE.length];
        });

        // Beide gestapelten Charts nutzen dieselbe Rangfolge pro Balken:
        // größte Spielzeit unten, kleinste oben.
        const monthDatasets = buildRankedStackDatasets(
          agg.apps,
          monthlyByAppLastX,
          colorByApp
        );
        // Tages-Chart in Minuten: Buckets vor dem Ranking auf Minuten umrechnen,
        // damit Balken- und Tooltip-Werte konsistent sind.
        const dailyByAppMinutes = agg.dailyByApp.map((bucket) => {
          const scaled = {};
          for (const [app, hours] of Object.entries(bucket)) {
            scaled[app] = hours * 60;
          }
          return scaled;
        });
        const dayDatasets = buildRankedStackDatasets(
          agg.apps,
          dailyByAppMinutes,
          colorByApp
        );

        const commonOptions = {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: stackedBarInteraction,
          plugins: {
            legend: {
              display: false,
            },
          },
          scales: {
            x: {
              stacked: true,
              ticks: {
                color: "#cbd5f5",
                font: { size: 10 },
              },
              grid: {
                display: false,
              },
            },
            y: {
              stacked: true,
              ticks: {
                color: "#cbd5f5",
                font: { size: 10 },
              },
              grid: {
                color: "rgba(148, 163, 184, 0.22)",
              },
              title: { display: false },
            },
          },
        };

        // Mittlerer Chart (Stunden pro Monat): Achse mit "h", ohne Y-Titel
        const monthOptions = {
          ...commonOptions,
          plugins: {
            ...commonOptions.plugins,
            monthlyQuotaStepLine: {
              months: lastXMonths,
            },
            tooltip: createStackedBarTooltipConfig({
              formatValue: (value) => `${formatHours(value)} h`,
              getTitle: (items) => {
                const idx = items[0]?.dataIndex;
                const month = lastXMonths[idx];
                if (!month) return items[0]?.label || "";
                return new Date(month.year, month.monthIndex, 1).toLocaleString(
                  "de",
                  { month: "long", year: "numeric" }
                );
              },
            }),
          },
          scales: {
            x: commonOptions.scales.x,
            y: {
              ...commonOptions.scales.y,
              ticks: {
                ...commonOptions.scales.y.ticks,
                callback: (value) => String(Math.round(value)) + "h",
              },
              grid: {
                color: "rgba(148, 163, 184, 0.25)",
              },
              border: {
                display: false,
              },
            },
          },
        };

        // Oberer Chart (aktueller Monat pro Tag) in Minuten; Wochenenden hervorheben
        const dayOptions = {
          ...commonOptions,
          plugins: {
            ...commonOptions.plugins,
            weekendBackground: {
              currentYear: agg.currentYear,
              currentMonthIndex: agg.currentMonthIndex,
              daysInMonth: agg.daysInCurrentMonth,
              todayDay: agg.currentDayOfMonth ?? null,
            },
            // Grober Tagesrichtwert: 60 min als horizontale Budget-Linie.
            dailyTargetLine: {
              value: 60,
              color: "rgba(240, 245, 250, 0.65)",
              lineWidth: 1.5,
            },
            tooltip: createStackedBarTooltipConfig({
              formatValue: (value) => `${Math.round(value)} min`,
              showTotalOnlyWhenMultiple: true,
              getTitle: (items) => {
                if (!items.length) return "";
                const day = items[0].label;
                const monthName = new Date(
                  agg.currentYear,
                  agg.currentMonthIndex,
                  1
                ).toLocaleString("de", { month: "long" });
                return `${day}. ${monthName}`;
              },
            }),
          },
          scales: {
            x: {
              ...commonOptions.scales.x,
              ticks: {
                ...commonOptions.scales.x.ticks,
                maxRotation: 0,
                minRotation: 0,
              },
            },
            y: {
              ...commonOptions.scales.y,
              ticks: {
                ...commonOptions.scales.y.ticks,
                callback: (value) => String(Math.round(value)) + "m",
              },
              title: { display: false },
            },
          },
        };

        const gamesCtx = document
          .getElementById("gamesChart")
          .getContext("2d");
        const dayCtx = document
          .getElementById("dayChart")
          .getContext("2d");
        const monthCtx = document
          .getElementById("monthChart")
          .getContext("2d");

        if (gamesChartInstance) {
          gamesChartInstance.destroy();
        }
        if (dayChartInstance) {
          dayChartInstance.destroy();
        }
        if (monthChartInstance) {
          monthChartInstance.destroy();
        }

        // Daten für horizontales Balkendiagramm: Stunden pro Spiel (letzte X Monate)
        const totalByAppLastX = {};
        agg.apps.forEach((app) => {
          totalByAppLastX[app] = monthlyByAppLastX.reduce(
            (sum, bucket) => sum + (bucket[app] || 0),
            0
          );
        });
        const appsWithTime = agg.apps
          .map((app) => ({
            app,
            hours: totalByAppLastX[app] || 0,
          }))
          .filter((entry) => entry.hours > 0)
          .sort((a, b) => b.hours - a.hours);

        const gamesLabels = appsWithTime.map((entry) =>
          entry.app.replace(/\.exe$/i, "")
        );
        const gamesData = appsWithTime.map((entry) => entry.hours);
        const gamesColors = appsWithTime.map((entry, index) => {
          const c =
            colorByApp[entry.app] ||
            COLOR_PALETTE[index % COLOR_PALETTE.length];
          // etwas durchsichtiger machen
          return c + "99";
        });

        const gamesChartBlock = document.getElementById("games-chart-block");
        const barHeightPx = 26; // etwas niedrigere Höhe pro Spielzeile, wächst aber mit der Anzahl Spiele
        const gamesChartHeight = Math.max(170, appsWithTime.length * barHeightPx);
        if (gamesChartBlock) gamesChartBlock.style.height = gamesChartHeight + "px";

        gamesChartInstance = new Chart(gamesCtx, {
          type: "bar",
          data: {
            labels: gamesLabels,
            datasets: [
              {
                label: "Spielzeit",
                data: gamesData,
                backgroundColor: gamesColors,
                borderColor: gamesColors,
                borderWidth: 1,
              },
            ],
          },
          options: {
            indexAxis: "y",
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: {
              legend: {
                display: false,
              },
              tooltip: {
                callbacks: {
                  label: (context) => {
                    const raw = Number(context.parsed.x || 0);
                    return `${context.label}: ${formatHours(raw)} h`;
                  },
                },
              },
            },
            scales: {
              x: {
                ticks: {
                  color: "#cbd5f5",
                  font: { size: 10 },
                  callback: (value) => String(Math.round(Number(value))) + "h",
                },
                grid: {
                  color: "rgba(148, 163, 184, 0.25)",
                },
                border: {
                  display: false,
                },
              },
              y: {
                ticks: {
                  color: "#cbd5f5",
                  font: { size: 10 },
                },
                grid: {
                  display: false,
                },
                title: { display: false },
              },
            },
          },
        });

        // Oberer Chart: aktueller Monat pro Tag, in Minuten; Wochenenden hervorheben
        dayChartInstance = new Chart(dayCtx, {
          type: "bar",
          data: {
            labels: dayLabels,
            datasets: dayDatasets,
          },
          options: dayOptions,
        });

        // Mittlerer Chart: Stunden pro Monat (letzte X Monate); gestufte Quota-Linie per Plugin
        monthChartInstance = new Chart(monthCtx, {
          type: "bar",
          data: {
            labels: monthLabelsLastX,
            datasets: monthDatasets,
          },
          options: monthOptions,
        });
      }

      /** Setzt Überschrift „X / N h gespielt“ und (ausgeblendeten) Fortschrittsbalken. */
      function updateQuotaDisplay(totalHoursThisMonth, year, monthIndex) {
        const quota = getMonthlyQuotaHours(year, monthIndex);
        const used = totalHoursThisMonth;
        const ratio = quota > 0 ? used / quota : 0;
        const percentage = Math.round(ratio * 100);

        const quotaSummary = document.getElementById("quota-summary");
        const quotaFill = document.getElementById("quota-bar-fill");
        const quotaPercentage = document.getElementById("quota-percentage");

        if (quotaSummary) {
          // Beispiel: "3:18 / 10h"
          quotaSummary.textContent =
            formatHours(used) + " / " + Math.round(quota) + "h";
        }
        if (quotaFill) {
          quotaFill.style.width = Math.min(100, Math.max(0, percentage)) + "%";
        }
        if (quotaPercentage) {
          quotaPercentage.textContent = percentage + "%";
        }
      }

      /** Wendet aggregierte Daten an: Überschriften, Quota, Charts. Bei leeren Events: leere Charts. */
      function applyData(events) {
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonthIndex = now.getMonth();
        const daysInCurrentMonth = getDaysInMonth(currentYear, currentMonthIndex);
        if (!events || !events.length) {
          updateQuotaDisplay(0, currentYear, currentMonthIndex);
          const monthDate = new Date(currentYear, currentMonthIndex, 1);
          const monthLabel = monthDate.toLocaleString("de-DE", {
            month: "long",
            year: "numeric",
          });
          const currentHeading = document.getElementById("heading-current");
          const yearLabelEl = document.getElementById("heading-year-label");
          const yearSummaryEl = document.getElementById("heading-year-summary");
          if (currentHeading) currentHeading.textContent = monthLabel;
          if (yearLabelEl)
            yearLabelEl.textContent =
              "Letzten " + getMonthsToShow() + " Monate";
          if (yearSummaryEl) yearSummaryEl.textContent = "";
          const emptyAgg = {
            apps: [],
            monthlyByYearMonth: {},
            dailyByApp: Array.from({ length: daysInCurrentMonth }, () => ({})),
            totalHoursThisMonth: 0,
            currentYear,
            currentMonthIndex,
            daysInCurrentMonth,
            currentDayOfMonth: now.getDate(),
            matchedEvents: 0,
          };
          renderCharts(emptyAgg);
          requestAnimationFrame(updatePanelScaleToHeight);
          return;
        }
        const agg = aggregate(events);
        if (!agg.matchedEvents || agg.matchedEvents === 0 || !agg.apps.length) {
          console.warn(
            'Keine Spiele für das Muster "' + CONFIG.kidsPattern + '" gefunden.'
          );
          updateQuotaDisplay(0, agg.currentYear, agg.currentMonthIndex);
          renderCharts(agg);
          requestAnimationFrame(updatePanelScaleToHeight);
          return;
        }
        console.info("Gefilterte Spiele-Einträge:", agg.matchedEvents);
        const currentHeading = document.getElementById("heading-current");
        const yearLabelEl = document.getElementById("heading-year-label");
        const yearSummaryEl = document.getElementById("heading-year-summary");
        const monthDate = new Date(agg.currentYear, agg.currentMonthIndex, 1);
        const monthLabel = monthDate.toLocaleString("de-DE", {
          month: "long",
          year: "numeric",
        });
        if (currentHeading) currentHeading.textContent = monthLabel;

        const monthsToShow = getMonthsToShow();

        // Gesamtstunden der letzten 12 Monate berechnen (unabhängig von monthsToShow)
        const monthsBackForQuota = 12;
        const last12Months = Array.from(
          { length: monthsBackForQuota },
          (_, i) => {
            const idxFromEnd = i;
            const monthIndex =
              (agg.currentMonthIndex - idxFromEnd + 12) % 12;
            const year =
              agg.currentYear -
              (agg.currentMonthIndex - idxFromEnd < 0 ? 1 : 0);
            return { year, monthIndex };
          }
        );
        let hoursLast12 = 0;
        const monthlyByYearMonth = agg.monthlyByYearMonth || {};
        for (const { year, monthIndex } of last12Months) {
          const key = `${year}-${monthIndex}`;
          const bucket = monthlyByYearMonth[key];
          if (!bucket) continue;
          for (const val of Object.values(bucket)) {
            const h = Number(val) || 0;
            hoursLast12 += h;
          }
        }
        const quotaLast12 = sumQuotaForMonths(last12Months);
        const last12Summary =
          Math.floor(hoursLast12) + " / " + quotaLast12 + "h";

        if (yearLabelEl) {
          yearLabelEl.textContent = "Letzten " + monthsToShow + " Monate";
        }
        if (yearSummaryEl) {
          yearSummaryEl.textContent = last12Summary;
        }
        updateQuotaDisplay(
          agg.totalHoursThisMonth,
          agg.currentYear,
          agg.currentMonthIndex
        );
        renderCharts(agg);
        requestAnimationFrame(updatePanelScaleToHeight);
      }

      /**
       * Bei HTTP(S)-data_source: periodisch neu laden.
       * Schnell-Retry (5 s) nur bis zum ersten erfolgreichen Fetch, max. 60 s.
       * Danach refreshIntervalSeconds (Standard 300 s).
       */
      function startRefreshLoop(startTime = Date.now()) {
        if (!CONFIG.data_source || !/^https?:/i.test(CONFIG.data_source)) return;
        const elapsed = Date.now() - startTime;
        const useQuickRetry =
          !dataSourceLoadSucceeded && elapsed < AW_REFRESH_QUICK_WINDOW_MS;
        const intervalMs = useQuickRetry
          ? AW_REFRESH_QUICK_INTERVAL_MS
          : Math.max(
              60000,
              (Number(CONFIG.refreshIntervalSeconds) || 300) * 1000
            );
        const isLongPeriod = !useQuickRetry;
        setTimeout(async () => {
          const events = await loadEvents();
          if (events && events.length) {
            dataSourceLoadSucceeded = true;
            applyData(events);
          }
          if (isLongPeriod) {
            setBackgroundImage();
          }
          startRefreshLoop(startTime);
        }, intervalMs);
      }

      /** Start: Hintergrund, ggf. Cache anzeigen, dann API/Fallback laden; bei useApi + Fehler Refresh-Loop. */
      async function init() {
        setBackgroundImage();
        document.documentElement.style.setProperty("--dashboard-scale", "1");
        updateDevBadgeVisibility();

        const cachedRaw = loadFromCache();
        if (cachedRaw) {
          const events = extractEvents(cachedRaw);
          if (events && events.length) {
            console.info("Erste Anzeige aus Cache (letzter Ladevorgang).");
            applyData(events);
          }
        } else {
          const now = new Date();
          updateQuotaDisplay(0, now.getFullYear(), now.getMonth());
        }

        const events = await loadEvents();
        if (events && events.length) {
          dataSourceLoadSucceeded = true;
        }
        applyData(events || []);

        startRefreshLoop();

        window.addEventListener("resize", () => {
          requestAnimationFrame(updatePanelScaleToHeight);
        });
      }

      window.addEventListener("DOMContentLoaded", () => {
        init().catch((err) => {
          console.error("Initialization failed", err);
        });
      });
    </script>
  </body>
</html>
